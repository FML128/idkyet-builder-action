name: 'idkyet builder'
description: 'builder for the idkyet linux project'
inputs:
  layer_config_file:
    description: 'layer config file'
    required: true
  out_dir:
    description: 'out directory'
    required: true
  version:
    description: 'version for release'
    required: true
  registry_username:
    description: 'username for registry'
    required: true
  registry_password:
    description: 'password for registry'
    required: true
  registry_url:
    description: 'registry url (host) used for skopeo login and pushes'
    required: false
    default: 'git.fml128.ch'
  sb_db_key:
    description: 'secure_boot db key to sign efi'
    required: false
  sb_db_pem:
    description: 'secure_boot db pem to sign efi'
    required: false
  api_auth_token:
    description: 'api_auth_token if needed to download base images'
    required: false
  gpg_sign_key:
    description: 'gpg key to sign images'
    required: false
  dry_run:
    description: 'print the generated pipeline and exit without building or pushing'
    required: false
    default: 'false'
  only:
    description: 'build only the given layer id (and its internal ancestors)'
    required: false
    default: ''
  check_packages:
    description: 'run pacman/AUR package existence checks during validate'
    required: false
    default: 'false'
#outputs:
#  hashes:
#    description: 'json dict of hashes of all files'
runs:
  using: "composite"
  steps:
    - name: Validate
      uses: ./validate
      with:
        layer_config_file: ${{ inputs.layer_config_file }}
        check_packages: ${{ inputs.check_packages }}
    - name: Restore and build aur
      uses: ./aur
      with:
        layer_config_file: ${{ inputs.layer_config_file }}
    - name: Build images
      uses: ./builder
      with:
        layer_config_file: ${{ inputs.layer_config_file }}
        out_dir: ${{ inputs.out_dir }}
        registry_username: ${{ inputs.registry_username }}
        registry_password: ${{ inputs.registry_password }}
        registry_url: ${{ inputs.registry_url }}
        version: ${{ inputs.version }}
        sb_db_key: ${{ inputs.sb_db_key }}
        sb_db_pem: ${{ inputs.sb_db_pem }}
        api_auth_token: ${{ inputs.api_auth_token }}
        gpg_sign_key: ${{ inputs.gpg_sign_key }}
        dry_run: ${{ inputs.dry_run }}
        only: ${{ inputs.only }}

    - name: Upload Packages
      if: inputs.dry_run != 'true'
      run: |
        cd "${{ github.workspace }}/out"
        for f in *;do
          echo "Uploading $f"
          du -sh "$f"
          curl --fail --user "${{ inputs.registry_username }}:${{ inputs.registry_password }}" \
            --upload-file "$f" \
            "https://${{ inputs.registry_url }}/api/packages/${{ github.repository_owner }}/generic/${GITHUB_REPOSITORY#*/}/${{ inputs.version }}/$f"
        done
      shell: bash
    - name: If failure delete packages
      if: failure() && inputs.dry_run != 'true'
      run: |
        curl --user "${{ inputs.registry_username }}:${{ inputs.registry_password }}" \
          -X DELETE \
          "https://${{ inputs.registry_url }}/api/packages/${{ github.repository_owner }}/generic/${GITHUB_REPOSITORY#*/}/${{ inputs.version }}"
      shell: bash
